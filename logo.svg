<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#070d14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="100" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#1a2d3d" stroke-width="1"/>

  <!-- Circuit-like orbit lines -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#0a1e2e" stroke-width="8"/>
  <circle cx="100" cy="100" r="68" fill="none" stroke="#00d4ff" stroke-width="0.75" stroke-opacity="0.4"
    stroke-dasharray="12 6 3 6" stroke-dashoffset="0"/>

  <!-- Brain/neural node cluster - central hexagon -->
  <g filter="url(#soft-glow)">
    <!-- Hexagon -->
    <polygon points="100,68 128,84 128,116 100,132 72,116 72,84"
      fill="#0a1e2e" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.9"/>
    <!-- Inner hexagon -->
    <polygon points="100,78 118,88 118,112 100,122 82,112 82,88"
      fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  </g>

  <!-- Lightning bolt inside hex — the "mad" spark -->
  <g filter="url(#blur-glow)">
    <polyline points="107,82 96,100 104,100 93,120"
      fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="107,82 96,100 104,100 93,120"
      fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.8"/>
  </g>

  <!-- Orbital nodes — skills around the core -->
  <!-- Top -->
  <circle cx="100" cy="32" r="5" fill="#0a1e2e" stroke="#00d4ff" stroke-width="1.2"/>
  <circle cx="100" cy="32" r="2" fill="#00d4ff" opacity="0.9"/>
  <!-- Top-right -->
  <circle cx="148" cy="58" r="4" fill="#0a1e2e" stroke="#00d4ff" stroke-width="1.2"/>
  <circle cx="148" cy="58" r="1.5" fill="#00d4ff" opacity="0.7"/>
  <!-- Bottom-right -->
  <circle cx="148" cy="142" r="5" fill="#0a1e2e" stroke="#ff6b35" stroke-width="1.2"/>
  <circle cx="148" cy="142" r="2" fill="#ff6b35" opacity="0.9"/>
  <!-- Bottom -->
  <circle cx="100" cy="168" r="4" fill="#0a1e2e" stroke="#00d4ff" stroke-width="1.2"/>
  <circle cx="100" cy="168" r="1.5" fill="#00d4ff" opacity="0.7"/>
  <!-- Bottom-left -->
  <circle cx="52" cy="142" r="5" fill="#0a1e2e" stroke="#00d4ff" stroke-width="1.2"/>
  <circle cx="52" cy="142" r="2" fill="#00d4ff" opacity="0.8"/>
  <!-- Top-left -->
  <circle cx="52" cy="58" r="4" fill="#0a1e2e" stroke="#ff6b35" stroke-width="1.2"/>
  <circle cx="52" cy="58" r="1.5" fill="#ff6b35" opacity="0.9"/>

  <!-- Connector lines from hex corners to nodes -->
  <g stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.25">
    <line x1="100" y1="68" x2="100" y2="37"/>
    <line x1="128" y1="84" x2="144" y2="62"/>
    <line x1="128" y1="116" x2="144" y2="138"/>
    <line x1="100" y1="132" x2="100" y2="164"/>
    <line x1="72" y1="116" x2="56" y2="138"/>
    <line x1="72" y1="84" x2="56" y2="62"/>
  </g>

  <!-- Accent dot cluster — top right, suggests activity -->
  <circle cx="160" cy="44" r="2" fill="#ff6b35" opacity="0.6"/>
  <circle cx="168" cy="52" r="1.2" fill="#ff6b35" opacity="0.4"/>
  <circle cx="155" cy="36" r="1" fill="#ff6b35" opacity="0.3"/>
</svg>
